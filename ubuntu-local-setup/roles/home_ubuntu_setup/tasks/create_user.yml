---
- name: Add user.
  user:
    name: "{{ username }}"
    shell: /bin/bash
    groups: adm,cdrom,sudo,dip,plugdev,lpadmin,lxd
    password: "$6$z7ySCKJEMojTG4P9$dTcclU07ETfwoNNrYm8RjYb7ff0EBQjM7vqgraOFxiiA.yJTxSpI3Ld3.xXOoAPZvCi6DVrO.s9l3GjkWj3Kj0"
    append: yes
    generate_ssh_key: yes
    ssh_key_bits: 2048
    ssh_key_file: .ssh/id_rsa
  register: create_user
  # when: username is defined

- debug:
    var: script_dest_dir

- name: Assert required group variables are defined
  ansible.builtin.assert:
    that:
      - script_source_dir is defined
      - script_dest_dir is defined
    fail_msg: "Required variables script_source_dir or script_dest_dir are missing in group_vars/all.yml"
    success_msg: "script_source_dir and script_dest_dir are present"

# - name: sudo without password for devopsadmin user
- name: Create recursive directory for user cce
  ansible.builtin.file:
    path: "{{ script_dest_dir }}"
    state: directory
    owner: cce
    group: cce
    recurse: yes
    mode: 0755

- name: Copy file rsync_daily.sh to {{ script_dest_dir }}/rsync_daily.sh
  ansible.builtin.copy:
    src: "{{ script_source_dir }}/rsync_daily.sh"
    dest: "{{ script_dest_dir }}/rsync_daily.sh"
    owner: cce
    group: cce
    mode: 0655

- name: Copy file rsync_daily_at_evening.sh to {{ script_dest_dir }}/rsync_daily_at_evening.sh
  ansible.builtin.copy:
    src: "{{ script_source_dir }}/rsync_daily_at_evening.sh"
    dest: "{{ script_dest_dir }}/rsync_daily_at_evening.sh"
    owner: cce
    group: cce
    mode: 0655

- name: Copy file monitoronedrive.sh to {{ script_dest_dir }}/monitoronedrive.sh
  ansible.builtin.copy:
    src: "{{ script_source_dir }}/monitoronedrive.sh"
    dest: "{{ script_dest_dir }}/monitoronedrive.sh"
    owner: cce
    group: cce
    mode: 0655

# Copy cceplrsyncmail.py to {{ script_dest_dir }}/cceplrsyncmail.py
- name: Copy file cceplrsyncmail.py to {{ script_dest_dir }}/cceplrsyncmail.py
  ansible.builtin.copy:
    src: "{{ script_source_dir }}/cceplrsyncmail.py"
    dest: "{{ script_dest_dir }}/cceplrsyncmail.py"
    owner: cce
    group: cce
    mode: 0655

# Create rsync log directory /home/cce/logs/rsync
- name: Create rsync log directory {{ rsync_log_dir }}
  ansible.builtin.file:
    path: "{{ rsync_log_dir }}"
    state: directory
    owner: cce
    group: cce
    mode: 0755