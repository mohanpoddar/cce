---
- name: "Set target crontab user (default: cce)"
  set_fact:
    target_cron_user: "{{ orgusername | default('cce') }}"

- name: Read existing crontab for target user
  ansible.builtin.shell:
    cmd: "crontab -l -u {{ target_cron_user }}"
  register: existing_cron
  failed_when: false
  changed_when: false

- name: Write existing crontab to temporary file
  ansible.builtin.copy:
    content: "{{ existing_cron.stdout | default('') }}\n"
    dest: "/tmp/{{ target_cron_user }}.crontab.current"
    mode: '0600'

- name: Copy new crontab template to temporary file
  ansible.builtin.copy:
    src: crontab
    dest: "/tmp/{{ target_cron_user }}.crontab"
    mode: '0600'
    owner: root
    group: root

- name: Install crontab for user if different
  ansible.builtin.shell: |
    set -o pipefail
    if ! diff -q /tmp/{{ target_cron_user }}.crontab /tmp/{{ target_cron_user }}.crontab.current >/dev/null 2>&1; then
      crontab -u {{ target_cron_user }} /tmp/{{ target_cron_user }}.crontab
      echo CHANGED
    else
      echo NOCHANGE
    fi
  args:
    executable: /bin/bash
  register: crontab_result
  changed_when: "'CHANGED' in crontab_result.stdout"

- name: Remove temporary crontab files
  ansible.builtin.file:
    path: "/tmp/{{ item }}"
    state: absent
  loop:
    - "{{ target_cron_user }}.crontab"
    - "{{ target_cron_user }}.crontab.current"
  when: crontab_result is defined
